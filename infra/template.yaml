AWSTemplateFormatVersion: '2010-09-09'
Description: 'Serverless app infrastructure'

Resources:
  HostingBucket:
    Type: 'AWS::S3::Bucket'
    Properties:
      BucketName: !Sub '${AWS::StackName}-hosting-bucket'
      AccessControl: PublicRead
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: index.html

  DataTable:
    Type: 'AWS::DynamoDB::Table'
    Properties:
      TableName: !Sub '${AWS::StackName}-data-table'
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  HelloFunction:
    Type: 'AWS::Lambda::Function'
    Properties:
      FunctionName: !Sub '${AWS::StackName}-hello'
      Runtime: nodejs18.x
      Handler: index.hello
      Code:
        ZipFile: |
          const { DynamoDBClient, PutItemCommand } = require('@aws-sdk/client-dynamodb');
          const client = new DynamoDBClient({ region: process.env.AWS_REGION });

          exports.hello = async (event) => {
            const params = {
              TableName: process.env.TABLE_NAME,
              Item: {
                id: { S: 'test' },
                data: { S: JSON.stringify(event) }
              }
            };
            await client.send(new PutItemCommand(params));
            return {
              statusCode: 200,
              body: JSON.stringify({ message: 'Hello from Lambda!', event }),
            };
          };
      Environment:
        Variables:
          TABLE_NAME: !Ref DataTable
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DataTable

Outputs:
  HostingBucketName:
    Description: 'Name of the S3 bucket for hosting'
    Value: !Ref HostingBucket
    Export:
      Name: !Sub '${AWS::StackName}-HostingBucket'

  DataTableName:
    Description: 'Name of the DynamoDB table'
    Value: !Ref DataTable
    Export:
      Name: !Sub '${AWS::StackName}-DataTable'